name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Windows VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |

            echo "🚀 Starting deployment..."

            cd C:\Users\tntadmin\Documents\teasntrees_littleh_backend\backend

            echo "📦 Pulling latest code from main..."
            git reset --hard
            git pull origin main

            echo "📦 Installing dependencies..."
            npm install

            echo "🔁 Restarting PM2 backend..."
            pm2 reload teasntrees-backend || pm2 start src/server.js --name teasntrees-backend

            echo "🌐 Checking nginx status..."
            tasklist | findstr nginx

            if %ERRORLEVEL%==0 (
              echo "♻️ Reloading nginx..."
              C:\nginx\nginx.exe -s reload
            ) else (
              echo "⚠️ nginx not running, starting it..."
              start C:\nginx\nginx.exe
            )

            echo "✅ Deployment complete"
