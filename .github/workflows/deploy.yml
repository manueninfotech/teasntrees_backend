name: Deploy Backend

on:
  push:
    branches:
      - feature/littleh-multi-brand

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo Current directory:
            cd
            cd "C:\Users\tntadmin\Documents\teasntrees_littleh_backend\backend"

            echo Inside backend folder:
            dir

            git pull origin feature/littleh-multi-brand
            npm install
            pm2 reload teas-backend