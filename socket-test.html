<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.io Test</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .status.disconnected {
            background: #fee;
            color: #c00;
        }

        .status.connected {
            background: #efe;
            color: #0a0;
        }

        input,
        button {
            padding: 12px;
            margin: 5px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #5568d3;
        }

        .log {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .log-item {
            padding: 8px;
            margin: 5px 0;
            border-left: 4px solid #667eea;
            background: white;
            border-radius: 4px;
        }

        .log-item.error {
            border-left-color: #dc3545;
        }

        .log-item.success {
            border-left-color: #28a745;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔌 Socket.io Real-Time Test</h1>

        <div id="status" class="status disconnected">
            ❌ Disconnected
        </div>

        <div>
            <h3>Step 1: Connect to Socket.io</h3>
            <input type="text" id="token" placeholder="Paste JWT Token" style="width: 500px">
            <button onclick="connectSocket()">Connect</button>
            <button onclick="disconnectSocket()">Disconnect</button>
        </div>

        <div style="margin-top: 20px;">
            <h3>Step 2: Test Events</h3>
            <button onclick="testEvent()">Send Test Event</button>
            <button onclick="clearLog()">Clear Log</button>
        </div>

        <div class="log" id="log">
            <p style="color: #999;">Log messages will appear here...</p>
        </div>
    </div>

    <script>
        let socket = null;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const item = document.createElement('div');
            item.className = `log-item ${type}`;
            item.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong> - ${message}`;
            logDiv.appendChild(item);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function updateStatus(connected) {
            const statusDiv = document.getElementById('status');
            if (connected) {
                statusDiv.className = 'status connected';
                statusDiv.textContent = '✅ Connected to Socket.io';
            } else {
                statusDiv.className = 'status disconnected';
                statusDiv.textContent = '❌ Disconnected';
            }
        }

        function connectSocket() {
            const token = document.getElementById('token').value.trim();

            if (!token) {
                alert('Please paste a JWT token first');
                return;
            }

            if (socket && socket.connected) {
                log('Already connected', 'info');
                return;
            }

            log('Connecting to Socket.io...', 'info');

            socket = io('http://localhost:5000', {
                auth: {
                    token: token
                }
            });

            // Connection events
            socket.on('connect', () => {
                log('✅ Connected successfully!', 'success');
                updateStatus(true);
            });

            socket.on('disconnect', () => {
                log('❌ Disconnected from server', 'error');
                updateStatus(false);
            });

            socket.on('connect_error', (error) => {
                log(`❌ Connection error: ${error.message}`, 'error');
                updateStatus(false);
            });

            // System messages
            socket.on('system:message', (data) => {
                log(`📢 System: ${JSON.stringify(data)}`, 'info');
            });

            // Order events
            socket.on('order:created', (data) => {
                log(`🛒 Order Created: ${JSON.stringify(data)}`, 'success');
            });

            socket.on('order:status-updated', (data) => {
                log(`📦 Order Status Updated: ${JSON.stringify(data)}`, 'info');
            });

            // Category events
            socket.on('category:created', (data) => {
                log(`📁 Category Created: ${JSON.stringify(data)}`, 'success');
            });

            socket.on('category:updated', (data) => {
                log(`📝 Category Updated: ${JSON.stringify(data)}`, 'info');
            });

            socket.on('category:deleted', (data) => {
                log(`🗑️ Category Deleted: ${JSON.stringify(data)}`, 'error');
            });

            // Product events
            socket.on('product:created', (data) => {
                log(`📦 Product Created: ${JSON.stringify(data)}`, 'success');
            });

            socket.on('product:updated', (data) => {
                log(`📝 Product Updated: ${JSON.stringify(data)}`, 'info');
            });

            socket.on('product:deleted', (data) => {
                log(`🗑️ Product Deleted: ${JSON.stringify(data)}`, 'error');
            });

            // Rider events
            socket.on('rider:online', (data) => {
                log(`🚴 Rider Online: ${JSON.stringify(data)}`, 'success');
            });

            socket.on('rider:offline', (data) => {
                log(`🚴 Rider Offline: ${JSON.stringify(data)}`, 'error');
            });

            // Delivery events
            socket.on('delivery:assigned', (data) => {
                log(`🚚 Delivery Assigned: ${JSON.stringify(data)}`, 'info');
            });

            // Notifications
            socket.on('notification:new', (data) => {
                log(`🔔 Notification: ${JSON.stringify(data)}`, 'info');
            });
        }

        function disconnectSocket() {
            if (socket) {
                socket.disconnect();
                socket = null;
                log('Disconnected manually', 'info');
            }
        }

        function testEvent() {
            if (!socket || !socket.connected) {
                alert('Please connect first');
                return;
            }

            // Example: Send test event (if backend supports it)
            log('Sending test event...', 'info');
            socket.emit('test:ping', { message: 'ping' });
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }
    </script>
</body>

</html>
