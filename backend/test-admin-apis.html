<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin API Tester - Postman-like</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .login-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .login-box h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .login-box input {
            padding: 10px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 200px;
        }

        .login-box button {
            padding: 10px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            margin: 5px;
        }

        .login-box button:hover {
            background: #5568d3;
        }

        .token-display {
            margin-top: 10px;
            padding: 10px;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: 4px;
            display: none;
            font-size: 14px;
        }

        .request-builder {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .request-builder h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .request-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        .method-select {
            padding: 12px 15px;
            border: 2px solid #667eea;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            background: white;
            cursor: pointer;
            min-width: 100px;
        }

        .endpoint-input {
            flex-grow: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .send-btn {
            padding: 12px 40px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .send-btn:hover {
            background: #5568d3;
        }

        .body-section {
            margin-top: 15px;
        }

        .body-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .body-textarea {
            width: 100%;
            min-height: 150px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
        }

        .quick-examples {
            margin-top: 15px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 4px;
        }

        .quick-examples h4 {
            margin-bottom: 10px;
            color: #1976d2;
        }

        .example-btn {
            padding: 6px 12px;
            margin: 3px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .example-btn:hover {
            background: #1976d2;
        }

        .response-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            min-height: 200px;
        }

        .response-section h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .response-content {
            background: white;
            padding: 20px;
            border-radius: 4px;
            border-left: 4px solid #ddd;
            min-height: 150px;
        }

        .response-content.success {
            border-left-color: #28a745;
            background: #f0fff4;
        }

        .response-content.error {
            border-left-color: #dc3545;
            background: #fff5f5;
        }

        .response-content pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .status-200 {
            background: #28a745;
            color: white;
        }

        .status-201 {
            background: #28a745;
            color: white;
        }

        .status-400 {
            background: #ffc107;
            color: black;
        }

        .status-401 {
            background: #dc3545;
            color: white;
        }

        .status-404 {
            background: #dc3545;
            color: white;
        }

        .status-500 {
            background: #dc3545;
            color: white;
        }

        .info-note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 Admin API Tester</h1>
        <p class="subtitle">Test any admin endpoint with custom method and body - Like Postman</p>

        <!-- Login Section -->
        <div class="login-box">
            <h3>🔐 Step 1: Login (Get Token)</h3>
            <div class="info-note">
                <strong>Note:</strong> Check server console for OTP after sending
            </div>
            <div>
                <input type="text" id="mobile" placeholder="Mobile (9876543210)" value="9876543210">
                <button onclick="sendOTP()">Send OTP</button>
            </div>
            <div style="margin-top: 10px;">
                <input type="text" id="otp" placeholder="Enter OTP">
                <button onclick="verifyOTP()">Verify & Login</button>
            </div>
            <div class="token-display" id="tokenDisplay"></div>
        </div>

        <!-- Request Builder -->
        <div class="request-builder">
            <h3>📝 Step 2: Build Your Request</h3>

            <div class="request-row">
                <select id="method" class="method-select">
                    <option value="GET">GET</option>
                    <option value="POST">POST</option>
                    <option value="PATCH">PATCH</option>
                    <option value="PUT">PUT</option>
                    <option value="DELETE">DELETE</option>
                </select>

                <input type="text" id="endpoint" class="endpoint-input" placeholder="/api/admin/categories"
                    value="/api/admin/categories">

                <button class="send-btn" onclick="sendRequest()">Send Request</button>
            </div>

            <div class="body-section">
                <label for="requestBody">Request Body (JSON) - Optional:</label>
                <textarea id="requestBody" class="body-textarea" placeholder='{"name": "New Category"}'></textarea>
            </div>

            <div class="quick-examples">
                <h4>⚡ Quick Examples:</h4>
                <button class="example-btn" onclick="loadExample('getCategories')">Get Categories</button>
                <button class="example-btn" onclick="loadExample('createCategory')">Create Category</button>
                <button class="example-btn" onclick="loadExample('getProducts')">Get Products</button>
                <button class="example-btn" onclick="loadExample('createProduct')">Create Product</button>
                <button class="example-btn" onclick="loadExample('getOrders')">Get Orders</button>
                <button class="example-btn" onclick="loadExample('updateOrderStatus')">Update Order Status</button>
                <button class="example-btn" onclick="loadExample('getUsers')">Get Users</button>
                <button class="example-btn" onclick="loadExample('getDashboard')">Dashboard Stats</button>
                <button class="example-btn" onclick="loadExample('getSettings')">Get Settings</button>
            </div>
        </div>

        <!-- Response Section -->
        <div class="response-section">
            <h3>📊 Response:</h3>
            <div class="response-content" id="response">
                <pre>Click "Send Request" to test an endpoint...</pre>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';
        let token = '';
        let lastCategoryId = '';
        let lastProductId = '';
        let lastOrderId = '';

        async function sendOTP() {
            const mobile = document.getElementById('mobile').value;

            try {
                const response = await fetch(`${API_BASE}/api/auth/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile })
                });

                const data = await response.json();

                if (data.success) {
                    alert('✅ OTP sent! Check server console for OTP code.');
                } else {
                    alert('❌ Failed: ' + data.message);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function verifyOTP() {
            const mobile = document.getElementById('mobile').value;
            const otp = document.getElementById('otp').value;

            try {
                const response = await fetch(`${API_BASE}/api/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, otp })
                });

                const data = await response.json();

                const tokenValue = data.data?.token || data.token;
                const user = data.data?.user || data.user;

                if (data.success && tokenValue) {
                    token = tokenValue;
                    const display = document.getElementById('tokenDisplay');
                    display.style.display = 'block';
                    display.innerHTML = `
                        ✅ <strong>Logged in as ${user?.name || user?.mobile} (${user?.role || 'N/A'})</strong><br>
                        <small>Token: ${token.substring(0, 50)}...</small>
                    `;
                    alert('✅ Login successful! You can now test admin APIs.');
                } else {
                    alert('❌ Login failed: ' + data.message);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function sendRequest() {
            const method = document.getElementById('method').value;
            const endpoint = document.getElementById('endpoint').value;
            const bodyText = document.getElementById('requestBody').value;
            const responseDiv = document.getElementById('response');

            responseDiv.className = 'response-content';
            responseDiv.innerHTML = '<pre>⏳ Loading...</pre>';

            try {
                const options = {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    }
                };

                // Add token if available
                if (token) {
                    options.headers['Authorization'] = `Bearer ${token}`;
                }

                // Add body for POST/PATCH/PUT
                if (bodyText && (method === 'POST' || method === 'PATCH' || method === 'PUT')) {
                    try {
                        JSON.parse(bodyText); // Validate JSON
                        options.body = bodyText;
                    } catch (e) {
                        responseDiv.className = 'response-content error';
                        responseDiv.innerHTML = '<pre>❌ Invalid JSON in request body</pre>';
                        return;
                    }
                }

                const response = await fetch(`${API_BASE}${endpoint}`, options);
                const data = await response.json();

                // Save IDs for future use
                if (data.success && data.data) {
                    if (Array.isArray(data.data) && data.data.length > 0) {
                        if (endpoint.includes('categor')) lastCategoryId = data.data[0]._id;
                        if (endpoint.includes('product')) lastProductId = data.data[0]._id;
                        if (endpoint.includes('order')) lastOrderId = data.data[0]._id;
                    } else if (data.data._id) {
                        if (endpoint.includes('categor')) lastCategoryId = data.data._id;
                        if (endpoint.includes('product')) lastProductId = data.data._id;
                        if (endpoint.includes('order')) lastOrderId = data.data._id;
                    }
                }

                responseDiv.className = 'response-content ' + (response.ok ? 'success' : 'error');
                responseDiv.innerHTML = `
                    <span class="status-badge status-${response.status}">${response.status} ${response.statusText}</span><br>
                    <strong>${data.success ? '✅ Success' : '❌ Failed'}</strong>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;

            } catch (error) {
                responseDiv.className = 'response-content error';
                responseDiv.innerHTML = `<pre>❌ Error: ${error.message}</pre>`;
            }
        }

        function loadExample(type) {
            const examples = {
                getCategories: {
                    method: 'GET',
                    endpoint: '/api/admin/categories',
                    body: ''
                },
                createCategory: {
                    method: 'POST',
                    endpoint: '/api/admin/categories',
                    body: JSON.stringify({
                        name: "New Category",
                        description: "Category description",
                        icon: "🍕",
                        displayOrder: 1
                    }, null, 2)
                },
                getProducts: {
                    method: 'GET',
                    endpoint: '/api/admin/products',
                    body: ''
                },
                createProduct: {
                    method: 'POST',
                    endpoint: '/api/admin/products',
                    body: JSON.stringify({
                        name: "Test Product",
                        description: "Product description",
                        category: lastCategoryId || "CATEGORY_ID",
                        price: 299,
                        isAvailable: true,
                        preparationTime: 15,
                        tags: ["new-intro"]
                    }, null, 2)
                },
                getOrders: {
                    method: 'GET',
                    endpoint: '/api/admin/orders',
                    body: ''
                },
                updateOrderStatus: {
                    method: 'PATCH',
                    endpoint: `/api/admin/orders/${lastOrderId || 'ORDER_ID'}/status`,
                    body: JSON.stringify({
                        status: "confirmed"
                    }, null, 2)
                },
                getUsers: {
                    method: 'GET',
                    endpoint: '/api/admin/users',
                    body: ''
                },
                getDashboard: {
                    method: 'GET',
                    endpoint: '/api/admin/dashboard/stats',
                    body: ''
                },
                getSettings: {
                    method: 'GET',
                    endpoint: '/api/admin/settings',
                    body: ''
                }
            };

            const example = examples[type];
            if (example) {
                document.getElementById('method').value = example.method;
                document.getElementById('endpoint').value = example.endpoint;
                document.getElementById('requestBody').value = example.body;
            }
        }

        // Keyboard shortcut: Ctrl+Enter to send
        document.getElementById('requestBody').addEventListener('keydown', function (e) {
            if (e.ctrlKey && e.key === 'Enter') {
                sendRequest();
            }
        });
    </script>
</body>

</html>
