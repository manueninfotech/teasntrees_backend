<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teas N Trees - Admin API Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin: 25px 0;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .section h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .step-number {
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .response {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }

        .token-display {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            word-break: break-all;
            display: none;
        }

        .token-display strong {
            color: #856404;
        }

        .info-box {
            background: #d1ecf1;
            border-left: 4px solid #0c5460;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            color: #0c5460;
        }

        .endpoint-group {
            margin: 10px 0;
        }

        .endpoint-group label {
            font-weight: 600;
            color: #666;
            display: block;
            margin: 10px 0 5px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🍵 Teas N Trees - Admin API Tester</h1>
            <p>Test all admin endpoints with authentication</p>
        </div>

        <div class="content">
            <!-- Info Box -->
            <div class="info-box">
                <strong>ℹ️ Note:</strong> Check the server console for OTP after sending. Default OTP is usually printed
                in the terminal.
            </div>

            <!-- Step 1: Send OTP -->
            <div class="section">
                <h3><span class="step-number">1</span> Send OTP</h3>
                <input type="text" id="mobile" placeholder="Enter Mobile Number (e.g., 9876543210)" value="9876543210">
                <button onclick="sendOTP()">📱 Send OTP</button>
                <div id="otpResponse" class="response"></div>
            </div>

            <!-- Step 2: Verify OTP -->
            <div class="section">
                <h3><span class="step-number">2</span> Verify OTP & Get Token</h3>
                <input type="text" id="otp" placeholder="Enter OTP from console (e.g., 12345)">
                <button onclick="verifyOTP()">🔐 Verify OTP & Login</button>
                <div id="tokenDisplay" class="token-display"></div>
                <div id="verifyResponse" class="response"></div>
            </div>

            <!-- Step 3: Test Admin APIs -->
            <div class="section">
                <h3><span class="step-number">3</span> Test Admin APIs</h3>

                <div class="endpoint-group">
                    <label>📂 Categories</label>
                    <select id="endpoint">
                        <option value="/api/admin/categories">GET - All Categories</option>
                        <option value="/api/admin/categories/[ID]">GET - Category by ID (enter ID below)</option>

                        <option disabled>──────────────</option>
                        <option value="/api/admin/products">GET - All Products</option>
                        <option value="/api/admin/products/[ID]">GET - Product by ID</option>
                        <option value="/api/admin/products?category=[ID]">GET - Products by Category</option>
                        <option value="/api/admin/products?search=pizza">GET - Search Products</option>

                        <option disabled>──────────────</option>
                        <option value="/api/admin/orders">GET - All Orders</option>
                        <option value="/api/admin/orders/stats">GET - Order Statistics</option>
                        <option value="/api/admin/orders/[ID]">GET - Order by ID</option>
                        <option value="/api/admin/orders?status=pending">GET - Orders by Status</option>

                        <option disabled>──────────────</option>
                        <option value="/api/admin/deliveries">GET - All Deliveries</option>
                        <option value="/api/admin/deliveries/stats">GET - Delivery Statistics</option>
                        <option value="/api/admin/deliveries/[ID]">GET - Delivery by ID</option>
                        <option value="/api/admin/deliveries?status=in-transit">GET - Deliveries by Status</option>

                        <option disabled>──────────────</option>
                        <option value="/api/admin/users">GET - All Users</option>
                        <option value="/api/admin/users/stats">GET - User Statistics</option>
                        <option value="/api/admin/users/[ID]">GET - User by ID</option>
                        <option value="/api/admin/users/role/customer">GET - Users by Role (customer)</option>
                        <option value="/api/admin/users/role/rider">GET - Users by Role (rider)</option>

                        <option disabled>──────────────</option>
                        <option value="/api/admin/settings">GET - Application Settings</option>
                        <option value="/api/admin/settings/delivery-zones">GET - Delivery Zones</option>

                        <option disabled>──────────────</option>
                        <option value="/api/admin/dashboard/stats">GET - Dashboard Statistics</option>
                        <option value="/api/admin/dashboard/revenue">GET - Revenue Analytics</option>
                        <option value="/api/admin/dashboard/top-products">GET - Top Products</option>
                        <option value="/api/admin/dashboard/recent-orders">GET - Recent Orders</option>
                    </select>
                </div>

                <input type="text" id="resourceId"
                    placeholder="Optional: Enter ID for specific resource (if endpoint has [ID])">

                <button onclick="testAdminAPI()">🚀 Test API</button>
                <div id="apiResponse" class="response"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';
        let authToken = '';

        async function sendOTP() {
            const mobile = document.getElementById('mobile').value;
            const responseDiv = document.getElementById('otpResponse');

            if (!mobile) {
                alert('Please enter mobile number');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/auth/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile })
                });

                const data = await response.json();
                responseDiv.style.display = 'block';
                responseDiv.textContent = JSON.stringify(data, null, 2);

                if (data.success) {
                    alert('✅ OTP sent successfully!\n\n📱 Check your server console for the OTP code.\n\nCopy the OTP and paste it in Step 2.');
                } else {
                    alert('❌ Failed to send OTP: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                responseDiv.style.display = 'block';
                responseDiv.textContent = 'Error: ' + error.message;
                alert('❌ Network error: ' + error.message);
            }
        }

        async function verifyOTP() {
            const mobile = document.getElementById('mobile').value;
            const otp = document.getElementById('otp').value;
            const responseDiv = document.getElementById('verifyResponse');
            const tokenDiv = document.getElementById('tokenDisplay');

            if (!mobile || !otp) {
                alert('Please enter both mobile number and OTP');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, otp })
                });

                const data = await response.json();
                responseDiv.style.display = 'block';
                responseDiv.textContent = JSON.stringify(data, null, 2);

                // Check for token in response (could be data.data.token or data.token)
                const token = data.data?.token || data.token;
                const user = data.data?.user || data.user;

                if (data.success && token) {
                    authToken = token;
                    tokenDiv.style.display = 'block';
                    tokenDiv.innerHTML = `
                        <strong>🔑 Authentication Token Saved!</strong><br>
                        <small>Token: ${authToken.substring(0, 50)}...</small><br>
                        <small>Role: ${user?.role || 'N/A'}</small>
                    `;
                    alert('✅ Login Successful!\n\n👤 User: ' + (user?.name || user?.mobile) + '\n🎭 Role: ' + (user?.role || 'N/A') + '\n\n🔓 You can now test admin APIs in Step 3!');
                } else {
                    alert('❌ Login failed: ' + (data.message || 'Invalid OTP'));
                }
            } catch (error) {
                responseDiv.style.display = 'block';
                responseDiv.textContent = 'Error: ' + error.message;
                alert('❌ Network error: ' + error.message);
            }
        }

        async function testAdminAPI() {
            if (!authToken) {
                alert('❌ Authentication Required!\n\nPlease complete Steps 1 & 2 first to get your authentication token.');
                return;
            }

            let endpoint = document.getElementById('endpoint').value;
            const resourceId = document.getElementById('resourceId').value;
            const responseDiv = document.getElementById('apiResponse');

            // Replace [ID] placeholder with actual ID if provided
            if (endpoint.includes('[ID]') && resourceId) {
                endpoint = endpoint.replace('[ID]', resourceId);
            } else if (endpoint.includes('[ID]')) {
                alert('⚠️ This endpoint requires an ID.\n\nPlease enter the resource ID in the input field above.');
                return;
            }

            try {
                responseDiv.style.display = 'block';
                responseDiv.textContent = 'Loading...';

                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                responseDiv.textContent = JSON.stringify(data, null, 2);

                if (response.ok) {
                    const count = data.count || (Array.isArray(data.data) ? data.data.length : 0);
                    alert(`✅ API Call Successful!\n\n📊 Status: ${response.status}\n📦 Items: ${count || 'N/A'}\n\nCheck the response below for details.`);
                } else {
                    alert(`⚠️ API Error!\n\n📊 Status: ${response.status}\n❌ Message: ${data.message || 'Unknown error'}`);
                }
            } catch (error) {
                responseDiv.style.display = 'block';
                responseDiv.textContent = 'Error: ' + error.message;
                alert('❌ Network error: ' + error.message + '\n\nMake sure the server is running on http://localhost:5000');
            }
        }

        // Auto-scroll to response
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                setTimeout(() => {
                    const responses = document.querySelectorAll('.response[style*="display: block"]');
                    if (responses.length > 0) {
                        responses[responses.length - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }, 300);
            });
        });
    </script>
</body>

</html>
