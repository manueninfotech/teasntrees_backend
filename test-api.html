<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth API Tester</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .section { margin: 30px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        input { padding: 8px; margin: 5px; width: 300px; border: 1px solid #ddd; border-radius: 4px; }
        .response { background: #f8f9fa; padding: 15px; border-radius: 4px; margin-top: 10px; white-space: pre-wrap; }
        .success { color: green; }
        .error { color: red; }
        h2 { color: #333; }
    </style>
</head>
<body>
    <h1>🔐 Authentication API Tester</h1>

    <!-- Test 1: Send OTP -->
    <div class="section">
        <h2>1. Send OTP</h2>
        <input type="text" id="mobile1" placeholder="Mobile (e.g., 9876543210)" value="9876543210">
        <button onclick="sendOTP()">Send OTP</button>
        <div id="response1" class="response"></div>
    </div>

    <!-- Test 2: Verify OTP -->
    <div class="section">
        <h2>2. Verify OTP</h2>
        <input type="text" id="mobile2" placeholder="Mobile" value="9876543210">
        <input type="text" id="otp" placeholder="OTP (check terminal)">
        <button onclick="verifyOTP()">Verify OTP</button>
        <div id="response2" class="response"></div>
    </div>

    <!-- Test 3: Complete Profile -->
    <div class="section">
        <h2>3. Complete Profile</h2>
        <input type="text" id="mobile3" placeholder="Mobile" value="9876543210"><br>
        <input type="text" id="name" placeholder="Name" value="John Doe"><br>
        <input type="email" id="email" placeholder="Email" value="john@example.com"><br>
        <input type="text" id="address" placeholder="Address" value="123 Main St"><br>
        <select id="role">
            <option value="customer">Customer</option>
            <option value="admin">Admin</option>
            <option value="rider">Rider</option>
            <option value="manager">Manager</option>
        </select><br>
        <button onclick="completeProfile()">Complete Profile</button>
        <div id="response3" class="response"></div>
    </div>

    <!-- Test 4: Get Profile -->
    <div class="section">
        <h2>4. Get Profile (Protected)</h2>
        <input type="text" id="token" placeholder="JWT Token from previous step" style="width: 500px">
        <button onclick="getProfile()">Get Profile</button>
        <div id="response4" class="response"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        async function sendOTP() {
            const mobile = document.getElementById('mobile1').value;
            const responseDiv = document.getElementById('response1');
            
            try {
                const response = await fetch(`${API_URL}/auth/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile })
                });
                
                const data = await response.json();
                responseDiv.innerHTML = `<div class="${response.ok ? 'success' : 'error'}">
                    ${JSON.stringify(data, null, 2)}
                </div>`;
                
                if (data.data?.otp) {
                    alert(`OTP: ${data.data.otp}\nCheck your terminal too!`);
                }
            } catch (error) {
                responseDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function verifyOTP() {
            const mobile = document.getElementById('mobile2').value;
            const otp = document.getElementById('otp').value;
            const responseDiv = document.getElementById('response2');
            
            try {
                const response = await fetch(`${API_URL}/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, otp })
                });
                
                const data = await response.json();
                responseDiv.innerHTML = `<div class="${response.ok ? 'success' : 'error'}">
                    ${JSON.stringify(data, null, 2)}
                </div>`;
            } catch (error) {
                responseDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function completeProfile() {
            const mobile = document.getElementById('mobile3').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const address = document.getElementById('address').value;
            const role = document.getElementById('role').value;
            const responseDiv = document.getElementById('response3');
            
            try {
                const response = await fetch(`${API_URL}/auth/complete-profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, name, email, address, role })
                });
                
                const data = await response.json();
                responseDiv.innerHTML = `<div class="${response.ok ? 'success' : 'error'}">
                    ${JSON.stringify(data, null, 2)}
                </div>`;
                
                if (data.data?.token) {
                    document.getElementById('token').value = data.data.token;
                    alert('Token saved! Now try "Get Profile"');
                }
            } catch (error) {
                responseDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function getProfile() {
            const token = document.getElementById('token').value;
            const responseDiv = document.getElementById('response4');
            
            try {
                const response = await fetch(`${API_URL}/users/profile`, {
                    method: 'GET',
                    headers: { 
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                responseDiv.innerHTML = `<div class="${response.ok ? 'success' : 'error'}">
                    ${JSON.stringify(data, null, 2)}
                </div>`;
            } catch (error) {
                responseDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
