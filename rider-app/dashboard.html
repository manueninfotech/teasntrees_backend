<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Dashboard | Teas N Trees</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
        }

        .active-glow {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">
    <!-- Header -->
    <div class="glass-nav fixed top-0 left-0 right-0 z-50 border-b border-slate-100">
        <div class="container mx-auto max-w-md px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i data-lucide="truck" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 id="riderName" class="text-lg font-black text-slate-800 uppercase leading-none">Rider App</h1>
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <span id="availabilityBadge" class="inline-block w-2 h-2 rounded-full bg-slate-300"></span>
                        <span id="availabilityText"
                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Checking...</span>
                    </div>
                </div>
            </div>
            <button id="logoutBtn"
                class="p-2.5 bg-slate-100 rounded-xl text-slate-500 hover:bg-red-50 hover:text-red-500 transition-all">
                <i data-lucide="log-out" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <div class="container mx-auto max-w-md px-6 pt-24 pb-32">
        <!-- Stats Summary -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Today's Earnings</p>
                <div class="flex items-baseline gap-1">
                    <span class="text-xs font-bold text-slate-500">₹</span>
                    <span id="todayEarnings" class="text-2xl font-black text-slate-800">0</span>
                </div>
            </div>
            <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Deliveries</p>
                <div class="flex items-baseline gap-1">
                    <span id="totalDeliveries" class="text-2xl font-black text-slate-800">0</span>
                    <i data-lucide="package" class="w-3 h-3 text-slate-400"></i>
                </div>
            </div>
        </div>

        <!-- Section: Active Order -->
        <div id="activeOrderSection" class="hidden mb-10 group">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <span class="inline-block w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></span>
                    Active Delivery
                </h2>
                <span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full uppercase">In
                    Transit</span>
            </div>
            <div id="activeOrderCard"
                class="bg-slate-900 rounded-[2.5rem] p-6 text-white shadow-2xl relative overflow-hidden transition-transform active:scale-[0.98] cursor-pointer">
                <!-- Content injected via app.js -->
            </div>
        </div>

        <!-- Section: Requests -->
        <div id="requestsSection">
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2 px-1">
                New Requests
                <span id="requestCount"
                    class="hidden bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full text-[9px]">0</span>
            </h2>
            <div id="requestsList" class="space-y-4">
                <div class="bg-white rounded-[2rem] p-10 border border-slate-100 text-center space-y-3">
                    <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto">
                        <i data-lucide="radar" class="w-8 h-8 text-slate-300"></i>
                    </div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Searching for nearby orders...
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Actions Bar -->
    <div class="fixed bottom-0 left-0 right-0 p-6 z-50">
        <div class="container mx-auto max-w-md p-0">
            <button id="toggleActiveBtn"
                class="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-black uppercase tracking-widest flex items-center justify-center gap-3 shadow-2xl transition-all hover:bg-slate-800 active:scale-[0.98]">
                <i data-lucide="power" class="w-5 h-5"></i>
                <span id="toggleBtnText">Go Online</span>
            </button>
        </div>
    </div>

    <script src="app.js?v=3"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
