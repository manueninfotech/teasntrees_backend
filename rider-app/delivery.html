<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Details | Teas N Trees</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div class="container mx-auto max-w-md px-6 pt-8 pb-32">
        <!-- Header -->
        <div class="flex items-center gap-4 mb-8">
            <button onclick="window.location.href='dashboard.html'"
                class="p-3 bg-white border border-slate-100 rounded-2xl shadow-sm text-slate-600 active:scale-95 transition-all">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <div>
                <h1 class="text-xl font-black text-slate-800 uppercase tracking-tight">Delivery Detail</h1>
                <p id="deliveryNumber" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">
                    Order #...</p>
            </div>
        </div>

        <div id="loader" class="py-20 text-center">
            <div class="animate-pulse flex flex-col items-center gap-4">
                <div class="w-12 h-12 bg-slate-200 rounded-full"></div>
                <div class="h-4 w-32 bg-slate-200 rounded"></div>
            </div>
        </div>

        <div id="content" class="hidden animate-fade-in space-y-6">
            <!-- Status Hero -->
            <div class="bg-slate-900 rounded-[2.5rem] p-7 text-white shadow-2xl relative overflow-hidden">
                <div class="flex justify-between items-center mb-6 relative z-10">
                    <span class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-400">Current
                        Progress</span>
                    <span id="statusBadge"
                        class="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest border border-emerald-500/30">...</span>
                </div>
                <h2 id="statusTitle" class="text-3xl font-black uppercase leading-none mb-2 relative z-10">...</h2>
                <div class="absolute -right-4 -bottom-4 opacity-10">
                    <i data-lucide="package" class="w-32 h-32"></i>
                </div>
            </div>

            <!-- Locations Card -->
            <div class="bg-white rounded-[2.5rem] p-6 border border-slate-100 shadow-sm space-y-6">
                <!-- Pickup -->
                <div class="flex gap-4">
                    <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center flex-shrink-0">
                        <i data-lucide="store" class="w-6 h-6 text-indigo-600"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Pickup From</p>
                        <p class="font-bold text-slate-800">Teas N Trees Outlet</p>
                        <p class="text-xs text-slate-500 font-medium mt-0.5">123, Coffee Main Road, Downtown</p>
                    </div>
                </div>

                <div class="ml-6 border-l-2 border-dashed border-slate-100 h-8"></div>

                <!-- Delivery -->
                <div class="flex gap-4">
                    <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center flex-shrink-0">
                        <i data-lucide="map-pin" class="w-6 h-6 text-emerald-600"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Deliver To</p>
                        <p id="customerName" class="font-bold text-slate-800 uppercase tracking-tight">...</p>
                        <p id="deliveryAddress" class="text-xs text-slate-500 font-medium mt-0.5">...</p>
                        <button id="callBtn"
                            class="mt-3 flex items-center gap-2 px-4 py-2 bg-slate-100 rounded-full text-[10px] font-black uppercase tracking-widest text-slate-600 hover:bg-slate-200 transition-all">
                            <i data-lucide="phone" class="w-3 h-3"></i> Call Customer
                        </button>
                    </div>
                </div>
            </div>

            <!-- Order Items -->
            <div class="bg-white rounded-[2.5rem] p-6 border border-slate-100 shadow-sm">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 px-1">Order Items</h3>
                <div id="orderItems" class="space-y-4">
                    <!-- Items list -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Action Bar -->
    <div id="actionBar" class="fixed bottom-0 left-0 right-0 p-6 z-50 hidden">
        <div class="container mx-auto max-w-md p-0">
            <div id="otpSection"
                class="hidden mb-4 p-6 bg-white/90 backdrop-blur-xl rounded-[2rem] border border-slate-100 shadow-2xl animate-fade-in">
                <label for="otpInput"
                    class="block text-[10px] font-black text-slate-400 uppercase tracking-widest text-center mb-4">Enter
                    Customer Verification OTP</label>
                <input type="text" id="otpInput" maxlength="4" placeholder="0000"
                    class="w-full bg-slate-100 border-none rounded-2xl py-5 text-center text-4xl tracking-[0.5em] font-black text-slate-800 focus:ring-2 focus:ring-emerald-500 transition-all appearance-none">
            </div>
            <button id="statusBtn"
                class="w-full py-5 bg-slate-900 text-white rounded-[2.5rem] font-black uppercase tracking-[0.2em] flex items-center justify-center gap-3 shadow-2xl transition-all hover:bg-slate-800 active:scale-[0.98]">
                <span id="statusBtnText">Update Status</span>
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <script src="delivery.js?v=3"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
