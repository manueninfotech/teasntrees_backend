<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Dashboard | Teas N Trees</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50">
    <div class="container pb-24">
        <!-- Dashboard Header -->
        <div class="flex items-center justify-between mb-8 pt-4">
            <div>
                <h1 id="riderName" class="text-2xl font-black text-gray-900 uppercase tracking-tight">Rider App</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="availabilityBadge" class="badge badge-active">Loading...</span>
                </div>
            </div>
            <button id="logoutBtn" class="p-3 bg-white border border-gray-100 rounded-2xl shadow-sm text-red-500">
                <i data-lucide="log-out"></i>
            </button>
        </div>

        <!-- Section: Active Order -->
        <div id="activeOrderSection" class="hidden animate-fade-in mb-8">
            <h2 class="label mb-4">Current Active Delivery</h2>
            <div id="activeOrderCard" class="card border-2 border-indigo-600 bg-indigo-50/30">
                <!-- Content injected via JS -->
            </div>
        </div>

        <!-- Section: Order Requests -->
        <div id="requestsSection">
            <h2 class="label mb-4">New Delivery Requests</h2>
            <div id="requestsList" class="space-y-4">
                <!-- Skeleton loader or generic message -->
                <p class="text-center text-gray-400 py-12 font-bold uppercase tracking-widest text-[10px]">Checking for
                    new orders...</p>
            </div>
        </div>
    </div>

    <!-- Bottom Actions Bar (e.g. Activity Toggle) -->
    <div
        class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-xl border-t border-gray-100 flex items-center justify-center">
        <div class="container p-0">
            <button id="toggleActiveBtn" class="btn btn-primary shadow-xl">
                <i data-lucide="power"></i>
                Go Offline
            </button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
